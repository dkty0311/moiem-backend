name: Deploy Application

on:
  push:
    branches: [ main ]  # main 브랜치에 푸시될 때만 작동

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 서버에서 실행될 명령어들
            cd /home/${{ secrets.SERVER_USER }}/project-folder  # 본인의 서버 프로젝트 경로
            git pull origin main
            npm install
            # 빌드가 필요한 경우: npm run build 
            pm2 restart my-app  # PM2를 사용해 서버 재시작
