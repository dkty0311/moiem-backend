name: Deploy Application

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 중복된 script: 태그를 제거하고, 확인된 절대 경로를 적용했습니다.
          script: |
            cd /usr/share/moiem-backend
            git pull origin main
            /root/.nvm/versions/node/v24.18.0/bin/npm install
            /root/.nvm/versions/node/v24.18.0/bin/pm2 restart moiem-backend
